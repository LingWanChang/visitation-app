<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>探視日小幫手</title>
  <meta name="theme-color" content="#fff7df">
  <style>
    :root {
      --ink:#3b2a22; --muted:#6f6259; --bg:#fff7df; --panel:#fff;
      --blue:#6bb7df; --green:#74b96f; --amber:#ffd66b;
      font-family:"Century Gothic","Microsoft JhengHei",sans-serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--ink);
      background:
        radial-gradient(circle at 14% 12%,rgba(255,255,255,.9) 0 34px,transparent 35px),
        radial-gradient(circle at 77% 10%,rgba(255,214,107,.45) 0 48px,transparent 49px),
        linear-gradient(180deg,#dff5ff 0,#fff7df 46%,#f3f7d7 100%);
    }
    main{width:min(1160px,calc(100% - 32px));margin:auto;padding:28px 0 42px}
    header,section,aside{
      background:var(--panel);border:3px solid var(--ink);
      border-radius:22px 18px 24px 16px;
      box-shadow:7px 9px 0 rgba(96,67,44,.16)
    }
    header{
      position:relative;overflow:hidden;padding:24px;
      display:flex;justify-content:space-between;gap:20px;align-items:end;
      background:linear-gradient(135deg,rgba(255,255,255,.96) 0 66%,rgba(255,242,199,.96) 66%);
    }
    h1{margin:0 0 8px;font-size:clamp(32px,5vw,54px);line-height:1;color:#4f8f49;text-shadow:2px 3px 0 rgba(59,42,34,.22)}
    header p,footer{margin:0;color:#2f3644;font-size:15px;line-height:1.7;font-weight:700}
    .today-pill{padding:12px 16px;border:3px solid var(--ink);border-radius:999px;background:#fff9c9;font-weight:800;white-space:nowrap;box-shadow:4px 5px 0 rgba(96,67,44,.18);transform:rotate(1deg)}
    .grid{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(330px,.95fr);gap:18px;margin-top:20px;align-items:start}
    section,aside{padding:18px}
    h2{margin:0 0 14px;font-size:19px;display:inline-block;padding:5px 10px;border:3px solid var(--ink);border-radius:16px;background:#fff2c7;box-shadow:3px 4px 0 rgba(96,67,44,.16);transform:rotate(-.7deg)}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    label{display:grid;gap:7px;color:var(--muted);font-size:14px;font-weight:800}
    input,select{width:100%;min-height:44px;border:2px solid var(--ink);border-radius:14px;padding:9px 11px;background:#fff;color:var(--ink);font:inherit;font-weight:800}
    .rule{margin-top:16px;border:2px solid var(--ink);border-left:9px solid var(--blue);border-radius:18px;padding:12px 13px;background:#fbfdff;line-height:1.65;font-weight:700}
    .actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:16px}
    button{border:3px solid var(--ink);border-radius:16px;padding:12px 14px;background:#fff9c9;color:var(--ink);font:inherit;font-weight:900;cursor:pointer;box-shadow:4px 5px 0 rgba(96,67,44,.18);transition:transform .12s}
    button:hover{transform:translateY(-2px)}
    button.primary{background:#a9e4f2}
    button.green{background:#cdebbd}
    .hero-result{padding:18px;border-radius:24px 18px 26px 20px;background:#ecf8dd;border:3px solid var(--ink);box-shadow:6px 8px 0 rgba(96,67,44,.18)}
    .hero-result span{display:block;color:var(--muted);font-weight:800;margin-bottom:5px}
    .hero-result strong{display:block;font-size:clamp(38px,8vw,70px);line-height:1;color:#4f8f49;text-shadow:3px 4px 0 rgba(59,42,34,.28)}
    .summary{margin-top:14px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .summary-box{border:2px solid var(--ink);border-radius:18px;padding:12px;background:#e9f8ff;box-shadow:4px 5px 0 rgba(96,67,44,.14)}
    .summary-box:nth-child(2){background:#ffeef3}
    .summary-box span{display:block;color:var(--muted);font-size:13px;font-weight:800;margin-bottom:5px}
    .summary-box strong{font-size:24px}
    .calendar{margin-top:18px}
    .calendar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .calendar-head strong{font-size:22px}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
    .weekday{text-align:center;font-weight:900;color:var(--muted);font-size:13px;padding:5px}
    .day{min-height:76px;border:2px solid var(--ink);border-radius:13px;padding:7px;background:#fff;box-shadow:2px 3px 0 rgba(96,67,44,.1)}
    .day.empty{border-color:transparent;background:transparent;box-shadow:none}
    .day strong{font-size:15px}
    .day.dad{background:#a9e4f2}
    .day.dad::after{content:"爸爸";display:block;margin-top:8px;font-size:12px;font-weight:900;color:#315f78}
    .day.today{outline:4px solid #ffd66b}
    .list{margin-top:18px;display:grid;gap:8px}
    .date-row{display:flex;justify-content:space-between;gap:10px;border:2px solid var(--ink);border-radius:14px;padding:10px 12px;background:#fff}
    .date-row b{color:#4f8f49}
    footer{margin-top:18px;padding:12px 14px;border:2px solid var(--ink);border-radius:18px;background:#fff;box-shadow:5px 6px 0 rgba(96,67,44,.14)}
    @media(max-width:880px){
      main{width:min(100% - 22px,760px);padding-top:18px}
      header{align-items:start;flex-direction:column;padding:18px}
      .grid,.form-grid,.summary{grid-template-columns:1fr}
      .today-pill{white-space:normal}
      .day{min-height:64px;padding:5px}
    }
  </style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>探視日小幫手V202607202155</h1>
      <p>幫你快速算出每個月爸爸的探視日，還可以一鍵匯出行事曆。</p>
    </div>
    <div class="today-pill" id="todayText">今天</div>
  </header>

  <div class="grid">
    <section>
      <h2>探視日計算</h2>
      <div class="form-grid">
        <label>年份<input id="year" type="number"></label>
        <label>月份<select id="month"></select></label>
      </div>
      <div class="rule">
        <b>目前規則：</b><br>
        每月第 1、3 週的星期五、六、日到爸爸那邊。<br>
        如果 1 號是星期六或星期日，該週不算第一週，從下一個星期一開始計算。
      </div>
      <div class="actions">
        <button class="primary" id="prev">← 上個月</button>
        <button class="primary" id="next">下個月 →</button>
        <button class="green" id="ics">📥 匯出全年探視日(Ios)</button>
        <button id="google">📅 匯出全年探視日(Google)</button>
      </div>
    </section>

    <aside>
      <h2>本月結果</h2>
      <div class="hero-result">
        <span>爸爸探視日</span>
        <strong id="count">6 天</strong>
      </div>
      <div class="summary">
        <div class="summary-box"><span>第 1 週</span><strong id="week1">—</strong></div>
        <div class="summary-box"><span>第 3 週</span><strong id="week3">—</strong></div>
      </div>
      <div class="list" id="list"></div>
    </aside>
  </div>

  <section class="calendar">
    <h2 id="calendarTitle">月曆</h2>
    <div class="calendar-grid" id="calendar"></div>
  </section>

  <footer>
    這個工具依照你提供的探視規則計算。匯出的 ICS 檔案可以匯入 Google Calendar、Apple 行事曆與其他支援行事曆的 App。
  </footer>
</main>

<script>
const $=id=>document.getElementById(id);
const pad=n=>String(n).padStart(2,"0");
const weekdays=["日","一","二","三","四","五","六"];
const now=new Date();
let currentYear=now.getFullYear(), currentMonth=now.getMonth()+1;
$("year").value=currentYear;
$("month").innerHTML=Array.from({length:12},(_,i)=>`<option value="${i+1}">${i+1} 月</option>`).join("");
$("month").value=currentMonth;
$("todayText").textContent=`今天 ${now.toLocaleDateString("zh-TW",{weekday:"long",month:"numeric",day:"numeric"})}`;

function dateKey(y,m,d){return `${y}-${pad(m)}-${pad(d)}`}
function getDadDates(year,month){
  const first=new Date(year,month-1,1);
  const firstDay=first.getDay();
  let firstMonday;
  if(firstDay===6) firstMonday=3;
  else if(firstDay===0) firstMonday=2;
  else firstMonday=1+(1-firstDay+7)%7;
  const dates=[];
  [1,3].forEach(week=>{
    const monday=firstMonday+(week-1)*7;
    [4,5,6].forEach(offset=>{
      const day=monday+offset;
      const d=new Date(year,month-1,day);
      if(d.getMonth()===month-1) dates.push({date:d,week});
    });
  });
  return dates;
}
function render(){
  currentYear=Number($("year").value);
  currentMonth=Number($("month").value);
  const dates=getDadDates(currentYear,currentMonth);
  $("count").textContent=`${dates.length} 天`;
  const w1=dates.filter(x=>x.week===1),w3=dates.filter(x=>x.week===3);
  $("week1").textContent=w1.length?`${w1[0].date.getDate()}-${w1[w1.length-1].date.getDate()} 日`:"—";
  $("week3").textContent=w3.length?`${w3[0].date.getDate()}-${w3[w3.length-1].date.getDate()} 日`:"—";
  $("calendarTitle").textContent=`${currentYear} 年 ${currentMonth} 月`;
  $("list").innerHTML=dates.map(x=>{
    const d=x.date;
    return `<div class="date-row"><span>${currentMonth}/${d.getDate()}（${weekdays[d.getDay()]}）</span><b>爸爸探視</b></div>`;
  }).join("");
  const calendar=$("calendar");
  calendar.innerHTML=weekdays.map(x=>`<div class="weekday">${x}</div>`).join("");
  const first=new Date(currentYear,currentMonth-1,1);
  const last=new Date(currentYear,currentMonth,0).getDate();
  const dadSet=new Set(dates.map(x=>x.date.getDate()));
  const todayKey=dateKey(now.getFullYear(),now.getMonth()+1,now.getDate());
  for(let i=0;i<first.getDay();i++) calendar.innerHTML+=`<div class="day empty"></div>`;
  for(let d=1;d<=last;d++){
    const key=dateKey(currentYear,currentMonth,d);
    calendar.innerHTML+=`<div class="day ${dadSet.has(d)?"dad":""} ${key===todayKey?"today":""}"><strong>${d}</strong></div>`;
  }
}

function toICSDate(d,h=9,m=0){
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(h)}${pad(m)}0000`;
}
function downloadICS(){
  const dates=getDadDates(currentYear,currentMonth);

  const events = dates.map(d=>{
    const startDate = d.date;
    const endDate = new Date(startDate);
    endDate.setDate(startDate.getDate()+1);
    const startStr = `${startDate.getFullYear()}${String(startDate.getMonth()+1).padStart(2,"0")}${String(startDate.getDate()).padStart(2,"0")}`;
    const endStr = `${endDate.getFullYear()}${String(endDate.getMonth()+1).padStart(2,"0")}${String(endDate.getDate()).padStart(2,"0")}`;

    return `BEGIN:VEVENT
UID:dad-visitation-${startStr}@visitation
DTSTAMP:${toICSDate(new Date())}
DTSTART;VALUE=DATE:${startStr}
DTEND;VALUE=DATE:${endStr}
SUMMARY:爸爸探視
DESCRIPTION:爸爸探視日
END:VEVENT`;
  }).join("\n\n");

  const ics = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//探視日小幫手//TW
CALSCALE:GREGORIAN

${events}

END:VCALENDAR`;

  const blob=new Blob([ics],{type:"text/calendar"});
  const url=URL.createObjectURL(blob);

  // 嘗試用 <a download> 方式，讓檔名正確
  /*const a=document.createElement("a");
  a.href=url;
  a.download=`${currentYear}-${pad(currentMonth)}-visitationDay.ics`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
*/
  // 如果 Safari 忽略 download，備案：直接開啟
  //setTimeout(()=>{ URL.revokeObjectURL(url); }, 2000);
  
  // 改成直接開啟，不用 download
  //window.location.href = url;
  console.log(ics); // 印出文字內容
  console.log(url); // 印出 blob URL
  window.open("https://lingwanchang.github.io/visitation-app/docs/2026-07test.ics");
}
function openGoogle(){
  const dates=getDadDates(currentYear,currentMonth);
  if(!dates.length)return;
  const d=dates[0].date;
  const start=`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T090000`;
  const end=`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T170000`;
  const url=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent("爸爸探視")}&dates=${start}/${end}&details=${encodeURIComponent("爸爸探視日")}`;
  window.open(url,"_blank");
}

$("year").addEventListener("input",render);
$("month").addEventListener("change",render);
$("prev").onclick=()=>{currentMonth--;if(currentMonth<1){currentMonth=12;currentYear--} $("year").value=currentYear;$("month").value=currentMonth;render()};
$("next").onclick=()=>{currentMonth++;if(currentMonth>12){currentMonth=1;currentYear++} $("year").value=currentYear;$("month").value=currentMonth;render()};
$("ics").onclick=downloadICS;
//$("ics").onclick = () => exportICS(currentYear, currentMonth);
$("google").onclick=openGoogle;
render();
</script>
</body>
</html>
